<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>Mission Control - Spatial Task Coordination</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
        }
        
        .mission-control-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .mission-control-logo {
            font-size: 18px;
            font-weight: 600;
            color: #00ff88;
            margin-right: 20px;
        }
        
        .mission-control-stats {
            display: flex;
            gap: 15px;
            margin-left: auto;
        }
        
        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .canvas-container {
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        .agent-presence {
            position: fixed;
            top: 70px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 999;
        }
        
        .agent-badge {
            background: #333;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            border: 2px solid;
        }
        
        .agent-gary { border-color: #ff6b6b; }
